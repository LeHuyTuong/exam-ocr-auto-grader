name: CI (test)

# Chạy test trên mọi Pull Request vào main/develop. Push vào main HOẶC develop
# đã có cổng test trong deploy.yml (test rồi mới deploy), nên ở đây bỏ qua 2
# nhánh đó để khỏi chạy test 2 lần.
on:
  pull_request:
    branches: [main, develop]
  push:
    branches-ignore: [main, develop]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, sqlite3, pdo_sqlite, bcmath, gd, zip, intl

      - name: Install composer dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist

      - name: Prepare test environment
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run PHPUnit tests
        working-directory: backend
        run: php artisan test

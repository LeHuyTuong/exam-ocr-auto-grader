name: Deploy backend to cPanel (zip + FTP)

# Chạy khi push vào main có thay đổi ở backend/, hoặc bấm tay trong tab Actions.
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, pdo_mysql, bcmath, gd, zip, intl

      - name: Install composer dependencies (production)
        working-directory: backend
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Build deploy zip
        working-directory: backend
        run: |
          zip -r -q -X ../deploy.zip . \
            -x ".env" \
            -x ".git/*" \
            -x ".github/*" \
            -x "node_modules/*" \
            -x "tests/*" \
            -x "storage/logs/*" \
            -x "storage/framework/cache/*" \
            -x "storage/framework/sessions/*" \
            -x "storage/framework/views/*" \
            -x "database/database.sqlite"

      - name: Upload single zip via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y lftp
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" -e "
            set ftp:ssl-allow no;
            set net:max-retries 3;
            set net:timeout 30;
            put deploy.zip -o ${FTP_SERVER_DIR}deploy.zip;
            bye"

      - name: Extract + migrate + seed on server
        run: |
          echo "Gọi deploy hook (giải nén + migrate + seed)..."
          curl -fsS --max-time 300 "https://carbonx.io.vn/__deploy?token=${{ secrets.DEPLOY_TOKEN }}" \
            || curl -fsS --max-time 300 "http://carbonx.io.vn/__deploy?token=${{ secrets.DEPLOY_TOKEN }}"
          echo ""
